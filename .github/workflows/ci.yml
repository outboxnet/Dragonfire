name: ci

# Runs the test suite for every Dragonfire sub-suite that has tests.
# Each suite builds and tests independently in parallel, so a failure in one
# suite doesn't mask failures in the others (fail-fast: false).
#
# Sub-suites listed here are exactly those with a tests/ directory. Add a new
# suite to the matrix when it gains its first test project.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test ${{ matrix.suite }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - Caching
          - Inbox
          - Logging
          - Outbox
          - Saga
          - Sync
          - TenantContext

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        shell: bash
        run: dotnet restore "Dragonfire.${{ matrix.suite }}/Dragonfire.${{ matrix.suite }}.slnx"

      - name: Build
        shell: bash
        run: |
          dotnet build "Dragonfire.${{ matrix.suite }}/Dragonfire.${{ matrix.suite }}.slnx" \
            --configuration Release --no-restore --nologo

      - name: Test
        shell: bash
        run: |
          dotnet test "Dragonfire.${{ matrix.suite }}/Dragonfire.${{ matrix.suite }}.slnx" \
            --configuration Release --no-build --nologo \
            --logger "console;verbosity=normal"
